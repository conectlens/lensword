name: CI

on:
  push:
    branches: [main, development]
  pull_request:
    branches: [main, development]

permissions:
  contents: read

jobs:
  backend:
    name: Backend (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest -v

  frontend:
    name: Frontend (Node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20]
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check and build
        run: npm run build

      - name: Unit tests
        run: npm test

  desktop:
    name: Desktop shell (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Rust ships preinstalled on the GitHub-hosted runners, so rustup is used
      # directly rather than adding a third-party toolchain action.
      - name: Add rustfmt and clippy
        run: rustup component add rustfmt clippy

      - name: Cache cargo registry and build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            desktop/target
          key: cargo-${{ runner.os }}-${{ hashFiles('desktop/Cargo.lock') }}
          restore-keys: cargo-${{ runner.os }}-

      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      # `tauri::generate_context!` embeds the frontend production build, so the
      # shell cannot be compiled at all without it.
      - name: Build the frontend the shell embeds
        working-directory: frontend
        run: |
          npm ci
          npm run build

      # Tauri links against the system webview on Linux.
      - name: Install webview build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libjavascriptcoregtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf

      - name: Format
        working-directory: desktop
        run: cargo fmt --check

      # Whole workspace, not just the validator crate. Scoping these to
      # `-p lensword-api-config` left the shell with no compiler pass at all:
      # renaming a field it consumes broke it while every check stayed green.
      - name: Clippy
        working-directory: desktop
        run: cargo clippy --locked --workspace --all-targets -- -D warnings

      - name: Tests
        working-directory: desktop
        run: cargo test --locked --workspace

      - name: Compile the shell
        working-directory: desktop
        run: cargo check --locked --workspace

  docker-build:
    name: Docker build validation
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    steps:
      - uses: actions/checkout@v7

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: backend
          push: false

      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: frontend
          push: false
